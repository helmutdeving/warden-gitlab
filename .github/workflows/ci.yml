name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run demo (dry run)
        run: node src/demo.js

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t warden-gitlab:test .

      - name: Smoke test container
        run: |
          # Run with no GitLab env — should exit gracefully in dry-run mode
          docker run --rm \
            -e WARDEN_TEST_INPUT="transfer 100 USDC to 0x1234567890123456789012345678901234567890 for test" \
            warden-gitlab:test || true
